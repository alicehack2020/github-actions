name: Deploy Node Application to AWS

on:
push:
branches:
  - master

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Deploy via SSH
    uses: appleboy/ssh-action@v1.0.3

    with:
      host: ${{ secrets.SSH_HOST }}
      username: ubuntu
      key: ${{ secrets.SSH_KEY }}
      script: |
        cd /home/ubuntu/github-actions
        git pull origin master
        docker compose down
        docker compose up -d --build
